<!DOCTYPE html>
<html lang="th">
<head>
    <!-- ชื่อแอป -->
<meta name="apple-mobile-web-app-title" content="Loan System">

<!-- เปิดแบบ fullscreen -->
<meta name="apple-mobile-web-app-capable" content="yes">

<!-- สี status bar -->
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<!-- ไอคอน -->
<link rel="apple-touch-icon" href="assets/icons/logo.png">
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<title>บริหารลูกค้ารายวัน</title>
<link rel="icon" type="image/png" href="assets/icons/favicon.png">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div id="navbar"></div>

<div class="container">

<h2 style="margin-bottom:20px;">บริหารลูกค้ารายวัน</h2>

<!-- ================= SUMMARY TABLE ================= -->

<div class="summary-table-box">
<table class="summary-table">
<thead>
<tr>
<th>รายการ</th>
<th>จำนวนเงิน (กีบ)</th>
</tr>
</thead>
<tbody>
<tr><td>จำนวนลูกค้า</td><td id="totalCustomers">0</td></tr>
<tr><td>ยอดส่งออฟฟิศ</td><td id="myMoney">0</td></tr>
<tr><td>ยอดปล่อยรวม</td><td id="totalLoanAmount">0</td></tr>
<tr><td>หนี้รวมทั้งหมด</td><td id="totalDebtAll">0</td></tr>
<tr><td>คงเหลือรวม</td><td id="totalRemainingAll">0</td></tr>
<tr><td>วันนี้ต้องเก็บ</td><td id="todayMustCollect">0</td></tr>
<tr><td>วันนี้เก็บแล้ว</td><td class="green" id="todayCollected">0</td></tr>
<tr><td>วันนี้ค้างเก็บ</td><td class="red" id="todayPending">0</td></tr>
<tr><td>ดอกค้างสะสม</td><td id="totalOverdue">0</td></tr>
<tr><td>วันนี้ปล่อยเงินใหม่</td><td id="todayReleased">0</td></tr>
<tr><td>ค่าคอมมิชชั่น</td><td id="totalFee">0</td></tr>
</tbody>
</table>
</div>

<br>

<!-- ================= CUSTOMER TABLE ================= -->

<div class="table-scroll">
<table class="dashboard-table">
<thead>
<tr>
<th>พนักงาน</th>
<th>ลูกค้า</th>
<th>เมือง</th>
<th>ยอดกู้</th>
<th>คงเหลือ</th>
<th>ยอดเก็บต่อวัน</th>
<th>จัดการ</th>
</tr>
</thead>
<tbody id="customerBody"></tbody>
</table>
</div>

</div>


<script src="/js/app.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script>

const token = localStorage.getItem("token");

let confirmCallback = null;

function format(num){
    return Number(num || 0).toLocaleString();
}

async function loadCustomers(){

    const res = await fetch("/api/customers",{
        headers:{ "Authorization":"Bearer "+token }
    });

    const result = await res.json();
    const data = result.customers;
    window.currentLoans = data;
    const tbody = document.getElementById("customerBody");
    tbody.innerHTML = "";

    let totalLoanAmount=0,totalDebtAll=0,totalRemainingAll=0,totalOverdue=0;
    let todayMustCollect=0,todayCollected=0,todayPending=0;
    let totalFee=0;

    const today = new Date().toDateString();

    data.forEach(loan=>{

    totalLoanAmount += loan.loanAmount || 0;
    totalDebtAll += loan.totalDebt || 0;
    totalRemainingAll += loan.remainingAmount || 0;
    totalOverdue += loan.overdueInterest || 0;

    
    const loanDate = new Date(loan.createdAt).toDateString();

if(loanDate === today){
    totalFee += loan.fee || 0;
}

    if(loan.status === "active" && (loan.remainingAmount||0)>0){

        todayMustCollect += loan.installment || 0;

        const paymentsToday = loan.paymentHistory?.filter(p=>{
            return new Date(p.date).toDateString() === today && p.type === "paid"
        }) || [];

        const paidAmountToday = paymentsToday.reduce((sum,p)=>sum+p.amount,0);

        const sentToday = loan.paymentHistory?.filter(p=>{
return new Date(p.date).toDateString() === today && p.type === "sent"
}) || [];

const sentAmount = sentToday.reduce((sum,p)=>sum+p.amount,0);

todayCollected += (paidAmountToday - sentAmount);

        let remainingToday = (loan.installment || 0) - paidAmountToday;

if(remainingToday < 0){
    remainingToday = 0;
}

     if(remainingToday > 0){
     todayPending += remainingToday;
      }

        const row=document.createElement("tr");


        row.innerHTML=`
        <td>${loan.employeeName || loan.employee || "-"}</td>
        <td>${loan.borrowerName || "-"}</td>
        <td>${loan.borrowerDistrict || "-"}</td>


        <td>${format(loan.loanAmount)}</td>
        <td>${format(loan.remainingAmount)}</td>

        <td>
        <input type="text"
class="daily-input"
id="amount_${loan._id}"
value="${format(remainingToday || loan.installment || 0)}"
data-default="${remainingToday || loan.installment || 0}"
readonly>
        </td>

        <td>

        <button class="action-btn btn-pay"
        onclick="payInstallment('${loan._id}')">
        จ่าย
        </button>

        <button class="action-btn btn-edit"
onclick="enableEdit('${loan._id}')">
แก้ไข
</button>

        <button class="action-btn btn-view"
        onclick="window.location='customer-detail.html?id=${loan._id}'">
        ดู
        </button>

        </td>
        `;

        

        tbody.appendChild(row);
    }

});

    document.getElementById("totalCustomers").innerText=data?.length || 0;
    document.getElementById("totalLoanAmount").innerText=format(totalLoanAmount);
    document.getElementById("totalDebtAll").innerText=format(totalDebtAll);
    document.getElementById("totalRemainingAll").innerText=format(totalRemainingAll);
    document.getElementById("todayMustCollect").innerText=format(todayMustCollect);
    document.getElementById("todayCollected").innerText=format(todayCollected);
    document.getElementById("todayPending").innerText=format(todayPending);
    document.getElementById("todayReleased").innerText =format(result.releasedToday);
    document.getElementById("totalOverdue").innerText=format(totalOverdue);
    document.getElementById("totalFee").innerText=format(totalFee);
}

async function payInstallment(id){

const input = document.getElementById("amount_"+id);
const amount = Number(input.value.replace(/,/g, ""));

if(!amount || amount <= 0){
    return showToast("จำนวนเงินไม่ถูกต้อง");
}

// 🔥 ยิงครั้งแรก
const res = await fetch(`/api/loans/${id}/pay-installment`,{
    method:"POST",
    headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
    },
    body:JSON.stringify({amount})
});

const result = await res.json();

// ==========================
// 🔥 ต้อง confirm
// ==========================
if(result.needConfirm){

showConfirm(result.message, async ()=>{

const res2 = await fetch(`/api/loans/${id}/pay-installment`,{
    method:"POST",
    headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+token
    },
    body:JSON.stringify({
        amount,
        force:true
    })
});

const result2 = await res2.json();

if(result2.success){
showToast("จ่ายซ้ำสำเร็จ");

// 🔥 หน่วงก่อน refresh
setTimeout(()=>{
    loadCustomers();
}, 500);

}else{
showToast("ผิดพลาด");
}

});

return;
}

// ==========================
// 🔥 ปกติ
// ==========================
if(result.success){
showToast("จ่ายสำเร็จ");

setTimeout(()=>{
    loadCustomers();
}, 500);

}else{
showToast(result.message || "ผิดพลาด");
}

// reset input
input.setAttribute("readonly", true);
input.style.border = "";
input.style.background = "";

loadCustomers();
}

async function markOverdue(id){

    const amount=Number(document.getElementById("amount_"+id).value);
    if(!amount) return showToast("กรอกยอดเงิน");

    await fetch(`/api/loans/${id}/overdue`,{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Bearer "+token
        },
        body:JSON.stringify({amount})
    });

    loadCustomers();
}


loadCustomers();

async function loadWallet(){

const token = localStorage.getItem("token");

const res = await fetch("/api/wallet/me",{
headers:{
Authorization:"Bearer "+token
}
});

const data = await res.json();

document.getElementById("myMoney").innerText =
Number(data.balance || 0).toLocaleString();

}

loadWallet();

const socket = io();

const user = JSON.parse(localStorage.getItem("user"));
if(user){
    socket.emit("join", user.id);
}

let refreshTimeout;

socket.on("customersUpdated", () => {
    clearTimeout(refreshTimeout);
    refreshTimeout = setTimeout(() => {
        loadCustomers();
        loadWallet(); // 👈 ตัวนี้คือสิ่งที่คุณต้องการ
    }, 300);
});

function enableEdit(id){
    const input = document.getElementById("amount_"+id);

    input.removeAttribute("readonly");
    input.focus();
    input.addEventListener("input", function(e){
    let value = e.target.value.replace(/,/g, "");
    if(isNaN(value)) return;

    e.target.value = Number(value).toLocaleString();
});

    // ใส่เส้น highlight ตอนแก้
    input.style.border = "2px solid orange";
    input.value = input.getAttribute("data-default");
}

function showConfirm(message, callback){
    document.getElementById("confirmMessage").innerText = message;
    document.getElementById("confirmModal").classList.add("active");
    confirmCallback = callback;
}

function closeConfirm(){
    document.getElementById("confirmModal").classList.remove("active");
}

async function handleConfirm(){
    closeConfirm();

    if(confirmCallback){
        await confirmCallback(); // 🔥 ตัวนี้คือจุดแก้
    }
}

function showToast(message){

const toast = document.getElementById("toast");

toast.innerText = message;
toast.classList.add("show");

setTimeout(()=>{
    toast.classList.remove("show");
}, 2500);

}
</script>
<!-- ✅ Confirm Modal -->
<div id="confirmModal" class="modal-overlay">
<div class="modal-box">
<h3 id="confirmTitle">ยืนยัน</h3>
<p id="confirmMessage">คุณแน่ใจหรือไม่?</p>

<div class="modal-buttons">
<button class="btn cancel" onclick="closeConfirm()">ยกเลิก</button>
<button class="btn success" onclick="handleConfirm()">ตกลง</button>
</div>

</div>
</div>

<div id="toast" class="toast"></div>
</body>
</html>
