<!DOCTYPE html>
<html lang="th">
<head>
    <!-- ชื่อแอป -->
<meta name="apple-mobile-web-app-title" content="Loan System">

<!-- เปิดแบบ fullscreen -->
<meta name="apple-mobile-web-app-capable" content="yes">

<!-- สี status bar -->
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<!-- ไอคอน -->
<link rel="apple-touch-icon" href="assets/icons/logo.png">
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<title>เปลี่ยนรหัสผ่าน | Loan System</title>
<link rel="icon" type="image/png" href="assets/icons/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

/* 🔥 กล่องเล็กลง + กระชับ */
.auth-box{
    width:100%;
    max-width:340px;
    background:rgba(15,23,42,0.95);
    padding:28px 24px;
    border-radius:16px;
    box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

.auth-box h2{
    text-align:center;
    margin-bottom:6px;
    font-size:20px;
}

.auth-box p{
    text-align:center;
    font-size:12px;
    opacity:0.6;
    margin-bottom:18px;
}

/* 🔥 spacing กระชับ */
.input-group{
    margin-bottom:14px;
    position:relative;
}

.input-group label{
    font-size:12px;
    opacity:0.7;
}

/* 🔥 input ดูโปรขึ้น */
.input-group input{
    width:100%;
    padding:10px 12px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid rgba(255,255,255,0.1);
    background:#1e293b;
    color:white;
    outline:none;
    font-size:13px;
    box-sizing: border-box; 
}

.input-group input:focus{
    border:1px solid #3b82f6;
    box-shadow:0 0 6px rgba(59,130,246,0.4);
}

/* 🔥 icon eye ใหม่ (สวย + กลม) */
.toggle-password{
    position:absolute;
    right:10px;
    top:50%;
    transform:translateY(-50%);
    width:28px;
    height:28px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    background:rgba(255,255,255,0.05);
    cursor:pointer;
    transition:0.2s;
}

.toggle-password:hover{
    background:rgba(59,130,246,0.2);
}

/* 🔥 ปุ่มเล็กลง */
.primary-btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#2563eb,#1d4ed8);
    color:white;
    font-size:14px;
    cursor:pointer;
    margin-top:8px;
    transition:0.2s;
}

.primary-btn:hover{
    transform:translateY(-1px);
    box-shadow:0 8px 20px rgba(37,99,235,0.4);
}

.success{
    color:#22c55e;
    font-size:12px;
    margin-top:6px;
}

.error{
    color:#ef4444;
    font-size:12px;
    margin-top:6px;
}

.link-text{
    text-align:center;
    margin-top:15px;
    font-size:12px;
}

.link-text a{
    color:#3b82f6;
    text-decoration:none;
}

/* 🔥 popup */
.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.hidden{
    display:none;
}

.popup-box{
    background:#0f172a;
    padding:20px;
    border-radius:12px;
    text-align:center;
    width:260px;
}

.popup-box h3{
    margin-bottom:8px;
    font-size:16px;
}

.popup-box button{
    margin-top:12px;
    padding:8px 16px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}

/* 🔥 ทำให้ input รองรับ icon */
.input-group{
    position:relative;
}

.input-group input{
    padding-right:40px; /* 👈 เว้นที่ icon */
}

/* 🔥 ปรับ icon ให้เนียนในช่อง */
.toggle-password{
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    width:30px;
    height:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:6px;
    background:rgba(255,255,255,0.05);
    cursor:pointer;
}

/* hover effect */
.toggle-password:hover{
    background:rgba(59,130,246,0.25);
}

.toggle-password svg{
    width:16px;
    height:16px;
}
</style>
</head>

<body>

<div class="auth-box">
    <h2>เปลี่ยนรหัสผ่าน</h2>
    <p>ระบบจะส่งรหัสยืนยันไปยังอีเมลของคุณ</p>

    <form id="resetForm">

        <div class="input-group">
            <label>อีเมล</label>
            <input type="email" id="email" required>
        </div>

        <button type="button" class="primary-btn" onclick="sendOTP()">ส่งรหัสยืนยัน</button>

        <div id="otpSection" style="display:none;">

            <div class="input-group">
                <label>รหัสยืนยัน (OTP)</label>
                <input type="text" id="otp" maxlength="6" pattern="[0-9]*">
            </div>

            <div class="input-group">
                <label>รหัสผ่านใหม่</label>
                <input type="password" id="newPassword">
            </div>

            <div class="input-group">
                <label>ยืนยันรหัสผ่านใหม่</label>
                <input type="password" id="confirmPassword">
            </div>

            <!-- 🔥 checkbox แสดงรหัส -->
            <div style="margin-top:8px; display:flex; align-items:center; gap:6px; font-size:12px; opacity:0.8;">
                <input type="checkbox" id="showPassword" onclick="toggleAllPasswords()">
                <label for="showPassword">แสดงรหัสผ่าน</label>
            </div>

            <button type="submit" class="primary-btn">ยืนยันเปลี่ยนรหัส</button>

        </div>

        <div id="message"></div>

    </form>

    <div class="link-text">
        กลับไป <a href="index.html">เข้าสู่ระบบ</a>
    </div>
</div>

<script src="js/reset-password.js"></script>

<div id="popup" class="popup hidden">
    <div class="popup-box">
        <h3 id="popupTitle"></h3>
        <p id="popupMessage"></p>
        <button onclick="closePopup()">ตกลง</button>
    </div>
</div>

<script>
function toggleAllPasswords(){
    const newPass = document.getElementById("newPassword");
    const confirmPass = document.getElementById("confirmPassword");
    const checkbox = document.getElementById("showPassword");

    if(checkbox.checked){
        newPass.type = "text";
        confirmPass.type = "text";
    }else{
        newPass.type = "password";
        confirmPass.type = "password";
    }
}
</script>

</body>
</html>
